services:
  # Frontend Service
  - type: web
    name: me-moo-stock-frontend
    runtime: node
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_URL
        fromService:
          name: me-moo-stock-backend
          type: web
          property: host
          path: /api

  # Backend Service
  - type: web
    name: me-moo-stock-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: me-moo-stock-frontend
          type: web
          property: host
